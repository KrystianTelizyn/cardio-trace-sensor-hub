services:
  redis:
    image: redis:8.4
    ports:
      - "6379:6379"
  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    depends_on:
      - redis
  broker:
    image: eclipse-mosquitto:latest
    ports:
      - "1883:1883"

