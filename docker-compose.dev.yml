  iot-simulation:
    image: cardio-trace-iot-sim:dev
    env_file:
      - .env
    depends_on:
      - broker
    volumes:
      - ./data:/app/data
    ports:
      - "8001:8000"

  sensor-hub:
    image: cardio-trace-sensor-hub:dev
    env_file:
      - .env
    depends_on:
      - broker
      - redis
